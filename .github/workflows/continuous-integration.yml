name: CI
on: [push]

jobs:
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install Yarn dependencies
        run: yarn install

      - name: Run solhint
        run: yarn solhint

      - name: Run prettier
        run: yarn prettier

      - name: Hardhat clean
        run: npx hardhat clean

      - name: Compile contracts
        run: yarn compile

      - name: Run tests
        env:
          ETHEREUM_RPC_URL: ${{ secrets.ETHEREUM_RPC_URL }}
        run: |
          yarn test
